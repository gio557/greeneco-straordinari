name: Deploy to GitHub Pages

# Pubblica la PWA "Gestione Straordinari" su GitHub Pages a ogni push su main.
#
# Metodo: build → pubblicazione dei file statici sul branch `gh-pages` con
# peaceiris/actions-gh-pages. È più robusto del deploy "GitHub Actions" nativo,
# che a volte resta appeso sull'ultimo passo (actions/deploy-pages) andando in
# timeout: qui pubblichiamo con un semplice push, senza attese lato servizio.
#
# NOTA DI CONFIGURAZIONE (una volta sola): in Settings → Pages, impostare
# "Build and deployment" → Source = "Deploy from a branch" → branch `gh-pages`
# cartella `/ (root)`.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Serve poter scrivere sul branch gh-pages.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Collaudo: se i test falliscono, il deploy si ferma qui.
      - run: npm test
      # Chiavi Supabase. Se imposti i Secret del repository (Settings →
      # Secrets and variables → Actions) hanno la precedenza; altrimenti si
      # usano i valori di fallback qui sotto. La chiave "anon" è pubblica per
      # progettazione (viaggia nel bundle del browser e la sicurezza è data da
      # Supabase Auth + RLS), quindi può stare nel workflow.
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://sgszmrgmlfsengbyoljg.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnc3ptcmdtbGZzZW5nYnlvbGpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTQ0NjUsImV4cCI6MjA5NzYzMDQ2NX0.95DqZr1UhsRPB8CYCE94kCVowSWx-6eKP6eChPFdt3Q' }}
      # Pubblicazione: push del contenuto di dist/ sul branch gh-pages.
      - name: Deploy su gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
