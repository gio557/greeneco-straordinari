name: Deploy to GitHub Pages

# Pubblica la PWA "Gestione Straordinari" su GitHub Pages a ogni push su main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Le chiavi Supabase arrivano dai Secrets del repository (Settings →
      # Secrets and variables → Actions). Se non impostate, l'app viene
      # compilata in modalità demo locale (nessun errore).
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      # enablement: true abilita GitHub Pages (sorgente "GitHub Actions")
      # automaticamente al primo deploy, senza toccare le impostazioni.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
